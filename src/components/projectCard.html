<div class="w-85.75 xl:w-136.5 flex flex-col gap-y-5">
    <div class="hidden xl:block relative group">
        <img src="{{ projectImg }}"
            class="w-136 h-100 scale-100 object-cover group-hover:scale-100" alt="icon projet">
        <div
            class="absolute inset-0 z-10 bg-black/60 w-136 h-100 flex flex-col justify-center items-center gap-y-12 opacity-0 group-hover:opacity-100">
            <a href="{{ linkDemo }}" target="_blank" rel="noopener noreferrer">
                <div class="w-26 flex flex-col gap-y-2.5">
                    <p class="text-preset-3 hover:text-green">
                        VOIR DEMO
                    </p>
                    <div class="h-0.5 bg-green"></div>
                </div>
            </a>
            <a href="{{ linkCode }}" target="_blank" rel="noopener noreferrer">
                <div class="w-26 flex flex-col gap-y-2.5">
                    <p class="text-preset-3 hover:text-green">
                        VOIR CODE
                    </p>
                    <div class="h-0.5 bg-green"></div>
                </div>
            </a>
        </div>
    </div>

    <img src="{{ projectImg }}" class="w-85.75 h-63.25 object-contain xl:hidden" alt="icon projet">

    <div class="flex flex-col gap-y-1.75">
        <span class="text-preset-4 font-bold">{{ projectName }}</span>
        <div class="flex flex-wrap gap-x-4">
            <each loop="item in projetSkill">
                <span class="text-preset-4 text-grey">{{ item }}</span>
            </each>
        </div>
    </div>

    <div class="w-67.75 flex flex-row gap-x-7.5 xl:hidden">
        <a href="{{ linkDemo }}" target="_blank" rel="noopener noreferrer">
            <div class="w-26 flex flex-col gap-y-2.5">
                <p class="text-preset-3 hover:text-green">
                    VOIR DEMO
                </p>
                <div class="h-0.5 bg-green"></div>
            </div>
        </a>
        <a href="{{ linkCode }}" target="_blank" rel="noopener noreferrer">
            <div class="w-26 flex flex-col gap-y-2.5">
                <p class="text-preset-3 hover:text-green">
                    VOIR CODE
                </p>
                <div class="h-0.5 bg-green"></div>
            </div>
        </a>
    </div>
</div>
