<div class="w-85.75 flex flex-col gap-y-5">
    <img src="{{ projectImg }}" class="w-85.75 h-63.25" alt="icon projet">
    <div class="flex flex-col gap-y-1.75">
        <span class="text-preset-4 font-bold">{{ projectName }}</span>
        <div class="flex flex-wrap gap-x-4">
            <each loop="item in projetSkill">
                <span class="text-preset-4 text-grey">{{ item }}</span>
            </each>
        </div>
    </div>
    <div class="w-67.75 flex flex-row gap-x-7.5">
        <a href="{{ linkDemo }}" target="_blank" rel="noopener noreferrer">
            <div class="w-26 flex flex-col gap-y-2.5">
                <p class="text-preset-3">
                    VOIR DEMO
                </p>
                <div class="h-0.5 bg-green"></div>
            </div>
        </a>
        <a href="{{ linkCode }}" target="_blank" rel="noopener noreferrer">
            <div class="w-26 flex flex-col gap-y-2.5">
                <p class="text-preset-3">
                    VOIR CODE
                </p>
                <div class="h-0.5 bg-green"></div>
            </div>
        </a>
    </div>
</div>
